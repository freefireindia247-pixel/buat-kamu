<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>

<style>
/* ================= PREMIUM OVERLAY ================= */

.overlay{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:1;
}

/* Aurora */

.overlay::before{
    content:"";
    position:absolute;
    width:160%;
    height:160%;
    left:-30%;
    top:-30%;

    background:
    radial-gradient(circle,#ffffff30 0%,transparent 40%),
    radial-gradient(circle,#ff94c833 20%,transparent 55%),
    radial-gradient(circle,#ffd6ec22 40%,transparent 70%);

    animation:aurora 18s linear infinite;
    filter:blur(80px);
}

@keyframes aurora{

0%{
transform:rotate(0deg) scale(1);
}

50%{
transform:rotate(180deg) scale(1.2);
}

100%{
transform:rotate(360deg) scale(1);
}

}

/* Sakura */

.sakura{
position:absolute;
top:-50px;
animation:sakuraFall linear infinite;
filter:
drop-shadow(0 0 8px #ffd6ea);
}

@keyframes sakuraFall{

0%{
transform:
translateY(-50px)
translateX(0)
rotate(0deg);
}

50%{
transform:
translateY(50vh)
translateX(60px)
rotate(360deg);
}

100%{
transform:
translateY(120vh)
translateX(-60px)
rotate(720deg);
}

}

/* Love */

.love{

position:absolute;

bottom:-50px;

color:#fff;

opacity:.8;

animation:loveUp linear infinite;

filter:
drop-shadow(0 0 10px #ff78ae);

}

@keyframes loveUp{

0%{
transform:translateY(0) scale(.5);
opacity:0;
}

30%{
opacity:1;
}

100%{
transform:
translateY(-120vh)
scale(1.6);
opacity:0;
}

}

/* Bubble */

.bubble{

position:absolute;

bottom:-50px;

border-radius:50%;

background:
rgba(255,255,255,.15);

border:
1px solid rgba(255,255,255,.35);

backdrop-filter:blur(5px);

box-shadow:

0 0 20px rgba(255,255,255,.2),

inset 0 0 12px rgba(255,255,255,.4);

animation:bubbleUp linear infinite;

}

@keyframes bubbleUp{

100%{

transform:
translateY(-120vh)
scale(1.4);

opacity:0;

}

}

/* Star */

.star{

position:absolute;

width:3px;

height:3px;

background:white;

border-radius:50%;

box-shadow:

0 0 10px white,

0 0 20px white;

animation:twinkle 2s infinite;

}

@keyframes twinkle{

0%,100%{

opacity:.2;

transform:scale(.6);

}

50%{

opacity:1;

transform:scale(2);

}

}

/* Shooting Star */

.shooting{

position:absolute;

width:120px;

height:2px;

background:
linear-gradient(90deg,#fff,transparent);

transform:rotate(-30deg);

animation:meteor 4s linear infinite;

opacity:.7;

}

@keyframes meteor{

0%{

transform:
translate(-200px,-200px)
rotate(-30deg);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:
translate(140vw,140vh)
rotate(-30deg);

opacity:0;

}

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at top left,#ffd6ea 0%,transparent 35%),
    radial-gradient(circle at bottom right,#ff9fc6 0%,transparent 35%),
    linear-gradient(135deg,#ff5fa2,#ff77b7,#ff8fc8);

    color:white;
    position:relative;
}

.card{
    position:relative;
    z-index:10;

    width:340px;
    height:80vh;          /* tinggi card tetap */
    max-height:600px;

    padding:35px;

    background:rgba(255,255,255,.18);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.3);
    border-radius:28px;

    text-align:center;
    color:white;

    box-shadow:
        0 20px 50px rgba(255,0,120,.25),
        inset 0 0 20px rgba(255,255,255,.15);

    display:flex;
    flex-direction:column;
}

h1{
    margin-bottom:20px;
}

#typing{
    min-height:250px;
    line-height:1.8;
    white-space:pre-wrap;
    font-size:18px;
    overflow-y:auto;
    flex:1;
    padding:10px 0;
}

button{
    padding:14px 35px;
    border:none;
    border-radius:50px;

    background:linear-gradient(45deg,#ff2d75,#ff6aa9);

    color:white;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;
    margin-top:auto;
}

button:hover{

transform:scale(1.08);

box-shadow:0 0 25px #ff7bb7;

}
</style>

</head>
<body>

<div class="overlay"></div>

<div class="card">

<h1>❤️ Hai Kamu ❤️</h1>

<div id="typing"></div>

<button onclick="selesai()">Lanjut ❤️</button>

</div>

<script>

const text=`Haiii... 😊

Kalau kamu lagi baca tulisan ini,
berarti aku akhirnya berhasil ngumpulin keberanian buat nyampein sesuatu yang dari dulu cuma aku simpen sendiri.

Jujur ya...

Awalnya aku nggak pernah nyangka bakal suka sama kamu.

Semuanya terjadi pelan-pelan.

Dari yang awalnya cuma kenal biasa,
terus jadi sering kepikiran.

Lama-lama aku sadar...

Kayaknya ada yang beda.

Entah kenapa,
setiap kali ada notifikasi dari kamu,
aku selalu buru-buru buka.

Kalau lagi ngobrol sama kamu,
rasanya waktu cepet banget jalan.

Terus kalau tiba-tiba obrolan kita selesai,
malah jadi nunggu kapan bisa ngobrol lagi.

Mungkin buat kamu itu hal yang biasa.

Tapi buat aku...

Hal-hal kecil itu justru jadi sesuatu yang bikin hari aku lebih berwarna.

Aku juga suka senyum-senyum sendiri kalau inget tingkah kamu.

Kadang kamu nggak sadar,
tapi cara kamu ngomong,
cara kamu ketawa,
bahkan hal-hal sederhana yang kamu lakuin,
selalu berhasil bikin aku kagum.

Aku tahu...

Aku bukan orang yang paling sempurna.

Masih banyak kurangnya.

Masih banyak yang harus aku perbaiki.

Aku juga bukan orang yang paling romantis.

Bahkan bikin tulisan ini aja
aku sempet mikir berkali-kali.

Takut.

Takut kalau ternyata perasaan ini cuma bertepuk sebelah tangan.

Takut kalau setelah ini hubungan kita malah jadi canggung.

Tapi...

Kalau aku terus diem,
aku bakal terus kepikiran.

Makanya hari ini aku mutusin buat jujur.

Aku nggak mau nyesel karena nggak pernah nyoba.

Aku nggak minta kamu langsung jawab sekarang.

Aku juga nggak mau maksa kamu.

Kalau memang kamu butuh waktu,
aku bakal menghargai keputusan itu.

Karena menurut aku,
perasaan nggak bisa dipaksa.

Yang paling penting,
sekarang kamu udah tahu apa yang selama ini aku rasain.

Aku suka sama kamu.

Suka yang bukan cuma karena wajah kamu.

Bukan juga karena orang lain bilang kamu baik.

Aku suka sama kamu...

Karena kamu adalah diri kamu sendiri.

Karena kamu bisa bikin aku nyaman.

Karena kamu bisa bikin aku senyum tanpa harus ngelakuin sesuatu yang berlebihan.

Karena sejak kenal kamu,
aku ngerasa ada seseorang yang selalu pengen aku lihat kabarnya.

Mungkin ini terdengar sederhana.

Tapi buat aku,
perasaan ini bener-bener tulus.

Kalau nanti kamu nerima aku...

Aku nggak janji bakal jadi cowok yang sempurna.

Tapi aku janji bakal berusaha jadi seseorang yang bisa bikin kamu nyaman,
ngertiin kamu,
nemenin kamu,
dan selalu ada buat kamu semampu aku.

Aku pengen kita bisa bikin banyak cerita bareng.

Ketawa bareng.

Jalan bareng.

Saling nyemangatin waktu lagi capek.

Dan saling ngingetin kalau salah.

Terakhir...

Terima kasih ya
udah mau baca semuanya sampai sini.

Semoga tulisan ini nggak bikin kamu risih.

Karena setiap kata yang kamu baca tadi,
itu bener-bener datang dari hati aku.

Jadi...

Maukah kamu ngasih aku kesempatan...

Buat jadi orang yang bisa nemenin hari-hari kamu?

Maukah kamu...

Jadi pacarku? ❤️`;



let i=0;

function ketik(){

    if(i<text.length){

        document.getElementById("typing").textContent+=text.charAt(i);

        i++;

        setTimeout(ketik,40);

    }

}

ketik();

function selesai(){

    window.location.href="halaman3.html";

}

// Generate random particles
function createParticles() {
    const overlay = document.querySelector('.overlay');
    const particleTypes = ['sakura', 'love', 'bubble', 'star', 'shooting'];
    
    for(let i = 0; i < 3; i++) {
        const type = particleTypes[Math.floor(Math.random() * particleTypes.length)];
        const element = document.createElement('div');
        element.className = type;
        
        if(type === 'sakura') {
            element.innerHTML = '🌸';
            element.style.left = Math.random() * 100 + '%';
            element.style.animationDuration = (8 + Math.random() * 4) + 's';
        } else if(type === 'love') {
            element.innerHTML = '❤️';
            element.style.left = Math.random() * 100 + '%';
            element.style.animationDuration = (3 + Math.random() * 2) + 's';
        } else if(type === 'bubble') {
            element.style.left = Math.random() * 100 + '%';
            element.style.width = (10 + Math.random() * 20) + 'px';
            element.style.height = element.style.width;
            element.style.animationDuration = (4 + Math.random() * 3) + 's';
        } else if(type === 'star') {
            element.style.left = Math.random() * 100 + '%';
            element.style.top = Math.random() * 100 + '%';
            element.style.animationDuration = (2 + Math.random() * 1) + 's';
        } else if(type === 'shooting') {
            element.style.left = Math.random() * 100 + '%';
            element.style.top = Math.random() * 100 + '%';
            element.style.animationDuration = (3 + Math.random() * 2) + 's';
        }
        
        overlay.appendChild(element);
        
        setTimeout(() => element.remove(), 10000);
    }
}

// Shooting Star
const overlay = document.querySelector('.overlay');
for(let i=0;i<6;i++){
    const m=document.createElement("div");
    m.className="shooting";
    m.style.left=Math.random()*100+"vw";
    m.style.top=Math.random()*50+"vh";
    m.style.animationDelay=(Math.random()*5)+"s";
    m.style.animationDuration=(3+Math.random()*4)+"s";
    overlay.appendChild(m);
}

setInterval(createParticles, 1500);
createParticles();

</script>

</body>
</html>
